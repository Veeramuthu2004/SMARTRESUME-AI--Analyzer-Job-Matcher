name: Smoke Tests

on:
  push:
    branches: [main]

jobs:
  invalid-login-smoke:
    name: Invalid Login Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Run invalid-login test
        run: |
          node tools/invalid-login-test.js
